<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1067">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3d2010"/>
      <stop offset="100%" stop-color="#1a0e08"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1067" fill="url(#bg)"/>
  <!-- Interior scene -->
  <g opacity="0.1" stroke="#D4956B" stroke-width="2" fill="none">
    <!-- Window -->
    <rect x="200" y="100" width="400" height="300" rx="8"/>
    <line x1="400" y1="100" x2="400" y2="400"/>
    <line x1="200" y1="250" x2="600" y2="250"/>
    <!-- Table -->
    <ellipse cx="400" cy="600" rx="150" ry="40"/>
    <line x1="400" y1="640" x2="400" y2="800"/>
    <!-- Cup on table -->
    <ellipse cx="350" cy="580" rx="25" ry="8" fill="#D4956B" opacity="0.3"/>
    <path d="M325 580 L330 610 Q350 618 370 610 L375 580"/>
    <!-- Chair -->
    <rect x="150" y="650" width="60" height="80" rx="5"/>
    <line x1="150" y1="730" x2="150" y2="850"/>
    <line x1="210" y1="730" x2="210" y2="850"/>
    <!-- Pendant light -->
    <line x1="400" y1="0" x2="400" y2="80"/>
    <path d="M370 80 Q400 120 430 80"/>
    <circle cx="400" cy="95" r="5" fill="#D4956B" opacity="0.4"/>
  </g>
</svg>
