<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="30%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#4a2c17"/>
      <stop offset="40%" stop-color="#2c1810"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <radialGradient id="g2" cx="70%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#3d200f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply" result="blend"/><feComponentTransfer><feFuncA type="linear" slope="0.03"/></feComponentTransfer></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#g2)"/>
  <!-- Coffee beans scattered -->
  <g opacity="0.08" fill="#D4956B">
    <ellipse cx="300" cy="400" rx="40" ry="25" transform="rotate(-30 300 400)"/>
    <ellipse cx="500" cy="600" rx="35" ry="22" transform="rotate(15 500 600)"/>
    <ellipse cx="800" cy="350" rx="45" ry="28" transform="rotate(-10 800 350)"/>
    <ellipse cx="1200" cy="500" rx="38" ry="24" transform="rotate(25 1200 500)"/>
    <ellipse cx="1500" cy="400" rx="42" ry="26" transform="rotate(-20 1500 400)"/>
    <ellipse cx="1600" cy="700" rx="36" ry="23" transform="rotate(10 1600 700)"/>
    <ellipse cx="400" cy="800" rx="40" ry="25" transform="rotate(-5 400 800)"/>
    <ellipse cx="1000" cy="700" rx="44" ry="27" transform="rotate(30 1000 700)"/>
  </g>
  <!-- Steam wisps -->
  <g opacity="0.04" fill="none" stroke="#D4956B" stroke-width="2">
    <path d="M960 800 Q950 700 970 600 Q990 500 960 400"/>
    <path d="M940 810 Q920 710 950 610 Q980 510 940 410"/>
    <path d="M980 790 Q990 690 970 590 Q950 490 980 390"/>
  </g>
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.5"/>
</svg>
