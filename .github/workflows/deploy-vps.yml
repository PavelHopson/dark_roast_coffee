name: Deploy to VPS (eclipse-forge.ru)

# Статический сайт (без сборки): rsync файлов репо на VPS (/var/www/coffee).
# css/main.css уже закоммичен; вход / -> redirect на pages/homepage.html.
# Секреты: VPS_SSH_KEY, VPS_HOST, VPS_USER, VPS_PATH.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy static site via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='tailwind.config.js' \
            --exclude='css/tailwind.css' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/"